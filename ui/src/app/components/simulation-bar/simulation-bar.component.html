<div class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-2 flex items-center gap-6 flex-wrap">
    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Simulation</span>

    <!-- Fast-forward -->
    <div class="flex items-center gap-2">
      <label class="text-sm text-gray-600 whitespace-nowrap">Fast-forward</label>
      <input
        type="number"
        [(ngModel)]="ffDays"
        min="1"
        max="365"
        class="w-16 rounded border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
      />
      <span class="text-sm text-gray-500">days</span>
      <button
        (click)="fastForward()"
        [disabled]="ffLoading()"
        class="rounded bg-indigo-600 px-3 py-1 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1"
      >
        @if (ffLoading()) {
          <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        }
        Go
      </button>
    </div>

    <div class="h-5 w-px bg-gray-200"></div>

    <!-- Bulk clients -->
    <div class="flex items-center gap-2">
      <label class="text-sm text-gray-600 whitespace-nowrap">Bulk clients</label>
      <input
        type="number"
        [(ngModel)]="bulkCount"
        min="1"
        max="100000"
        class="w-20 rounded border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
      />
      <button
        (click)="addClients()"
        [disabled]="bulkLoading()"
        class="rounded bg-gray-700 px-3 py-1 text-sm font-medium text-white hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1"
      >
        @if (bulkLoading()) {
          <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
        }
        Add
      </button>
    </div>

    <!-- Toast -->
    @if (toast()) {
      <span class="ml-auto text-sm text-gray-600 bg-gray-100 rounded px-3 py-1">{{ toast() }}</span>
    }
  </div>
</div>
